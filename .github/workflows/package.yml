name: Package Extension

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Package extension
        run: |
          npx web-ext build --overwrite-dest --filename "str-score-v{version}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: str-score-package
          path: web-ext-artifacts/str-score-v*.zip
